<nav class="sidebar">

  <div class="sidebar-brand">
    <mat-icon>grid_view</mat-icon>
    <span>School Name</span>
  </div>

  <div class="sidebar-divider"></div>

  <div class="nav-body">
    <div *ngFor="let section of sections" class="nav-section">

      <div class="section-header" (click)="toggleSection(section)">
        <div class="section-header-left">
          <mat-icon>{{ section.icon }}</mat-icon>
          <span class="section-label">{{ section.section }}</span>
        </div>
        <mat-icon class="chevron" [class.rotated]="section.isOpen">expand_more</mat-icon>
      </div>

      <div class="section-items" [class.open]="section.isOpen">
        <div
          *ngFor="let item of section.items"
          class="nav-item"
          [routerLink]="item.route"
          routerLinkActive="nav-item--active"
        >
          <mat-icon>{{ item.icon }}</mat-icon>
          <span>{{ item.name }}</span>
        </div>
      </div>

    </div>
  </div>

  <div class="sidebar-spacer"></div>

  <div class="sidebar-divider"></div>

  <div class="role-badge">
    <mat-icon>manage_accounts</mat-icon>
    <span>{{ roleName }}</span>
  </div>

  <div class="nav-item logout" (click)="logout()">
    <mat-icon>logout</mat-icon>
    <span>Logout</span>
  </div>

</nav>
